apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-dynamic-config
  namespace: foobar-namespace
data:
  # This key 'dynamic.yaml' must match the --providers.file.filename arg in deployment
  dynamic.yaml: |
    tls:
      certificates:
        - certFile: /certs/tls.crt
          keyFile: /certs/tls.key
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: foobar-ingress
  namespace: foobar-namespace
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true" # Forces TLS for this ingress
spec:
  rules:
  - host: foobar.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: foobar-service
            port:
              number: 80