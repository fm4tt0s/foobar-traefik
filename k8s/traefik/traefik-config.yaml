# Traefik Ingress resource defining routing rules and TLS entrypoints.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: foobar-ingress
  namespace: foobar-namespace
  annotations:
    # Use the websecure entrypoint
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # Force TLS for this router
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Tell Traefik the backend service is using HTTPS
    traefik.ingress.kubernetes.io/service.serversscheme: https
    traefik.ingress.kubernetes.io/service.serverstransport: insecure-transport@file
spec:
  # ARCHITECT NOTE: No 'tls:' block here. 
  # This ensures Traefik uses the PVC certificates from the default store.
  rules:
  - host: foobar.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: foobar-service
            port:
              number: 443