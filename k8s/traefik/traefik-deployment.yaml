# The edge-routing engine; configured to mount the certificate PVC and reload dynamic configs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: foobar-namespace
  labels:
    app: traefik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      serviceAccountName: traefik-ingress-controller
      # SRE: Ensuring certs exist before the engine starts
      initContainers:
      - name: wait-for-certs
        image: alpine
        command: ['sh', '-c', 'until [ -f /certs/tls.crt ]; do echo waiting for certs; sleep 2; done']
        volumeMounts:
        - name: certs-volume
          mountPath: /certs
      containers:
      - name: traefik
        image: traefik:v3.0
        args:
          - "--providers.kubernetesingress"
          # Architect's Fix: Point to the directory and enable watch for hot-reloads
          - "--providers.file.directory=/config"
          - "--providers.file.watch=true"
          - "--entrypoints.web.address=:80"
          - "--entrypoints.websecure.address=:443"
          - "--log.level=DEBUG" 
        ports:
          - name: web
            containerPort: 80
          - name: websecure
            containerPort: 443
          - name: admin
            containerPort: 8080
        volumeMounts:
          # Mount the certificates from the PVC
          - name: certs-volume
            mountPath: /certs
            readOnly: true
          # Mount the dynamic configuration from the ConfigMap
          - name: config-volume
            mountPath: /config
      volumes:
        - name: certs-volume
          persistentVolumeClaim:
            claimName: traefik-certs-pvc
        - name: config-volume
          configMap:
            name: traefik-dynamic-config