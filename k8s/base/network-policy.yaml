# security-aware add to restrict traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-allow-traefik
  namespace: foobar-namespace
spec:
  podSelector:
    matchLabels:
      app: foobar-api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: traefik