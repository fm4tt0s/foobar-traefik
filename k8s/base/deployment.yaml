# API deployment (2 replicas, PVC cert mounts)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: foobar-api
  namespace: foobar-namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: foobar-api
  template:
    metadata:
      labels:
        app: foobar-api
    spec:
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: foobar-api
        image: foobar-api:latest
        imagePullPolicy: Never
        args:
          - "-port"
          - "8080"
        ports:
        - containerPort: 8080
        volumeMounts:
          - name: certs-volume
            mountPath: /cert/cert.pem
            subPath: tls.crt
            readOnly: true
          - name: certs-volume
            mountPath: /cert/key.pem
            subPath: tls.key
            readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: certs-volume
        persistentVolumeClaim:
          claimName: traefik-certs-pvc