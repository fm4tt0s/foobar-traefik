# Service definition including SRE-focused liveness/readiness probes and resource constraints
apiVersion: apps/v1
kind: Deployment
metadata:
  name: foobar-api
  namespace: foobar-namespace
  labels:
    app: foobar-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: foobar-api
  template:
    metadata:
      labels:
        app: foobar-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: foobar-api
        image: foobar-api:latest
        imagePullPolicy: Never
        securityContext:
          capabilities:
            add: ["NET_BIND_SERVICE"] # Architect Move: Allow port 80 without root
        env:
          - name: CERT
            value: "/certs/tls.crt"
          - name: KEY
            value: "/certs/tls.key"
          - name: cert # Adding lowercase just in case
            value: "/certs/tls.crt"
          - name: key
            value: "/certs/tls.key"
        command: ["/foobar-api"]
        args: ["-port", "80"]
        ports:
        - containerPort: 80
        volumeMounts:
        - name: certs-volume
          mountPath: /certs
          readOnly: true
        livenessProbe:
          httpGet:
            path: /
            port: 80
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
            scheme: HTTPS
          initialDelaySeconds: 2
          periodSeconds: 5
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: certs-volume
        persistentVolumeClaim:
          claimName: traefik-certs-pvc