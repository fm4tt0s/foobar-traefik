# Service definition including SRE-focused liveness/readiness probes and resource constraints
apiVersion: apps/v1
kind: Deployment
metadata:
  name: foobar-api
  namespace: foobar-namespace
  labels:
    app: foobar-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: foobar-api
  template:
    metadata:
      labels:
        app: foobar-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: foobar-api
        image: foobar-api:latest
        imagePullPolicy: Never
        securityContext:
          capabilities:
            add: ["NET_BIND_SERVICE"]
        # FIX: Explicit binary path and all necessary flags
        command: ["/home/appuser/foobar-api"]
        args: 
          - "-port"
          - "80"
          - "-cert"
          - "/certs/tls.crt"
          - "-key"
          - "/certs/tls.key"
        ports:
        - containerPort: 80
        volumeMounts:
        - name: certs-volume
          mountPath: /certs
          readOnly: true
        livenessProbe:
          httpGet:
            path: /
            port: 80
            scheme: HTTPS
          initialDelaySeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 80
            scheme: HTTPS
          initialDelaySeconds: 2
      volumes:
      - name: certs-volume
        persistentVolumeClaim:
          claimName: traefik-certs-pvc